name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Windows 10+ [x86_64]
  # Icon wird via build.rs + winresource in die .exe eingebettet
  build-windows:
    name: Build Windows [x86_64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\mz-textbausteine.exe dist\
          Copy-Item mz-textbausteine.toml dist\
          Compress-Archive -Path dist\* -DestinationPath mz-textbausteine-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: mz-textbausteine-windows-x86_64.zip

  # GitHub Release erstellen mit dem Windows-Binary
  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mz-textbausteine-windows-x86_64.zip
